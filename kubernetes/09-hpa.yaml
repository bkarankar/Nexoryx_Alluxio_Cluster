apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: alluxio-worker-hpa
  namespace: nexoryx-alluxio
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: alluxio-worker
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
